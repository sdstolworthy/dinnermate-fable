# Nginx config for the Flutter web build.
#
# - SPA routing: missing paths fall back to index.html so go_router routes
#   like /r/CODE work on direct load.
# - /api/ is proxied to the compose `api` service so the client is
#   same-origin (no CORS in the browser).
# - Hashed Flutter build outputs cached aggressively; index.html never
#   cached so deploys propagate immediately.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint hit by the container healthcheck.
    location = /health.txt {
        access_log off;
        add_header Cache-Control "no-store";
    }

    location /api/ {
        # Resolve `api` lazily via Docker's embedded DNS so nginx still
        # starts when the api container isn't up yet (variable upstreams
        # skip the config-load resolution that a literal proxy_pass does).
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8080;
        # With a variable proxy_pass nginx does NOT append the remaining
        # request URI, so pass it explicitly via $request_uri.
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: serve index.html for any missing path.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # Flutter build outputs are content-addressed; safe to cache hard.
    location ~* \.(?:js|css|wasm|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        application/font-woff2;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
