services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: dinnermate
      POSTGRES_PASSWORD: dinnermate
      POSTGRES_DB: dinnermate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dinnermate -d dinnermate"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: server
    environment:
      DATABASE_URL: postgres://dinnermate:dinnermate@postgres:5432/dinnermate
      RESTAURANT_PROVIDER: seed
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: client
    ports:
      - "8888:80"
    depends_on:
      - api

volumes:
  pgdata:
