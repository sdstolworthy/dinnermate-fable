# api and web services are added in a later task (Task 11).
services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: dinnermate
      POSTGRES_PASSWORD: dinnermate
      POSTGRES_DB: dinnermate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dinnermate -d dinnermate"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
